<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{% block title %}One Time Secrets{% endblock %}</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --border: #334155;
            --text: #f8fafc;
            --muted: #94a3b8;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --success: #22c55e;
            --danger: #dc2626;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: Inter, Arial, sans-serif;
            min-height: 100vh;
        }

        .container {
            width: min(1200px, calc(100% - 40px));
            margin: 0 auto;
        }

        header {
            padding: 28px 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 50px;
        }

        header h1 {
            font-size: 30px;
            font-weight: 700;
        }

        header a {
            color: inherit;
            text-decoration: none;
        }

        main {
            padding-bottom: 60px;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 28px;
        }

        input,
        textarea {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            background: var(--bg);
            color: var(--text);
            border: 1px solid #475569;
            border-radius: 8px;
            font-size: 15px;
        }

        textarea {
            resize: vertical;
            min-height: 150px;
        }

        input:focus,
        textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        button {
            margin-top: 20px;
            padding: 12px 20px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
        }

        button:hover {
            background: var(--primary-hover);
        }

        .success {
            color: var(--success);
        }

        .error {
            color: var(--danger);
        }

        {% block styles %}{% endblock %}
    </style>
</head>
<body>

<header>
    <div class="container">
        <h1>
            <a href="/">🔒 One Time Secrets</a>
        </h1>
    </div>
</header>

<main class="container">
    {% block content %}{% endblock %}
</main>

{% block scripts %}{% endblock %}

</body>
</html>
